<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#eef2f7;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    border-radius:12px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

h1{
    text-align:center;
    color:#1d4ed8;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input[type=date]{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:25px;
}

button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.primary{
    background:#2563eb;
    color:white;
}

.primary:hover{
    background:#1d4ed8;
}

.secondary{
    background:#e5e7eb;
}

.result{
    display:none;
    margin-top:35px;
}

.summary{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-bottom:30px;
}

.box{
    background:#2563eb;
    color:white;
    text-align:center;
    padding:20px;
    border-radius:10px;
}

.box h2{
    font-size:40px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table td{
    padding:12px;
    border-bottom:1px solid #ddd;
}

table td:last-child{
    text-align:right;
    font-weight:bold;
}

.info{
    margin-top:30px;
    background:#f8f8f8;
    padding:20px;
    border-radius:10px;
}

.info p{
    margin:8px 0;
}

@media(max-width:700px){

.grid{
grid-template-columns:1fr;
}

.summary{
grid-template-columns:1fr;
}

.buttons{
flex-direction:column;
}

}
</style>

</head>
<body>

<div class="container">

<h1>Age Calculator</h1>

<p class="subtitle">
Calculate your exact age instantly.
</p>

<div class="grid">

<div>
<label>Date of Birth</label>
<input type="date" id="dob">
</div>

<div>
<label>Age at Date</label>
<input type="date" id="today">
</div>

</div>

<div class="buttons">

<button class="primary" onclick="calculateAge()">
Calculate
</button>

<button class="secondary" onclick="setToday()">
Today
</button>

<button class="secondary" onclick="clearAll()">
Clear
</button>

</div>

<div id="result" class="result">

<div class="summary">

<div class="box">
<h2 id="years">0</h2>
Years
</div>

<div class="box">
<h2 id="months">0</h2>
Months
</div>

<div class="box">
<h2 id="days">0</h2>
Days
</div>

</div>

<table>

<tr><td>Total Months</td><td id="totalMonths"></td></tr>
<tr><td>Total Weeks</td><td id="totalWeeks"></td></tr>
<tr><td>Total Days</td><td id="totalDays"></td></tr>
<tr><td>Total Hours</td><td id="totalHours"></td></tr>
<tr><td>Total Minutes</td><td id="totalMinutes"></td></tr>
<tr><td>Total Seconds</td><td id="totalSeconds"></td></tr>

</table>

<div class="info">

<h2>Additional Information</h2>

<p><strong>Born on:</strong> <span id="weekday"></span></p>

<p><strong>Next Birthday:</strong> <span id="nextBirthday"></span></p>

<p><strong>Days Remaining:</strong> <span id="daysLeft"></span></p>

<p><strong>Leap Year Birth:</strong> <span id="leap"></span></p>

</div>

</div>

</div>

<script>

const monthsName=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

setToday();

function setToday(){
document.getElementById("today").valueAsDate=new Date();
}

function clearAll(){

document.getElementById("dob").value="";
setToday();
document.getElementById("result").style.display="none";

}

function calculateAge(){

const dob=document.getElementById("dob").value;

const current=document.getElementById("today").value;

if(dob==""){
alert("Please select Date of Birth");
return;
}

const birth=new Date(dob);

const today=new Date(current);

if(birth>today){
alert("Birth date cannot be after selected date.");
return;
}

let years=today.getFullYear()-birth.getFullYear();
let months=today.getMonth()-birth.getMonth();
let days=today.getDate()-birth.getDate();

if(days<0){

months--;

let prevMonth=new Date(today.getFullYear(),today.getMonth(),0);

days+=prevMonth.getDate();

}

if(months<0){

years--;

months+=12;

}

let diff=today-birth;

let totalDays=Math.floor(diff/(1000*60*60*24));

let totalWeeks=Math.floor(totalDays/7);

let totalHours=Math.floor(diff/(1000*60*60));

let totalMinutes=Math.floor(diff/(1000*60));

let totalSeconds=Math.floor(diff/1000);

let totalMonths=years*12+months;

document.getElementById("years").textContent=years;
document.getElementById("months").textContent=months;
document.getElementById("days").textContent=days;

document.getElementById("totalMonths").textContent=totalMonths.toLocaleString();
document.getElementById("totalWeeks").textContent=totalWeeks.toLocaleString();
document.getElementById("totalDays").textContent=totalDays.toLocaleString();
document.getElementById("totalHours").textContent=totalHours.toLocaleString();
document.getElementById("totalMinutes").textContent=totalMinutes.toLocaleString();
document.getElementById("totalSeconds").textContent=totalSeconds.toLocaleString();

const weekdayNames=[
"Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"
];

document.getElementById("weekday").textContent=
weekdayNames[birth.getDay()];

let nextBirthday=new Date(
today.getFullYear(),
birth.getMonth(),
birth.getDate()
);

if(nextBirthday<today){

nextBirthday.setFullYear(today.getFullYear()+1);

}

let remain=Math.ceil((nextBirthday-today)/(1000*60*60*24));

document.getElementById("daysLeft").textContent=remain+" day(s)";

document.getElementById("nextBirthday").textContent=
nextBirthday.getDate()+" "+
monthsName[nextBirthday.getMonth()]+" "+
nextBirthday.getFullYear();

let leap=((birth.getFullYear()%4==0&&birth.getFullYear()%100!=0)||(birth.getFullYear()%400==0));

document.getElementById("leap").textContent=
leap?"Yes":"No";

document.getElementById("result").style.display="block";

}

</script>

</body>
</html>
